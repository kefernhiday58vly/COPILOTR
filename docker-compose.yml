version: '3.8'

services:
  # Workspace service for devcontainer
  workspace:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-22.04
    container_name: workspace
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity
    networks:
      - vm-network

  # Windows VM service
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      VERSION: "10"
      USERNAME: "MASTER"
      PASSWORD: "admin@123"
      RAM_SIZE: "5G"
      CPU_CORES: "2"
      DISK_SIZE: "100G"
      DISK2_SIZE: "100G"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - "8006:8006"
      - "3389:3389/tcp"
      - "3389:3389/udp"
    restart: unless-stopped
    stop_grace_period: 2m
    networks:
      - vm-network

  # Ubuntu CLI service for executing commands
  ubuntu_cli:
    image: ubuntu:22.04
    container_name: ubuntu_cli
    command: tail -f /dev/null
    volumes:
      - ./scripts:/scripts
    networks:
      - vm-network

networks:
  vm-network:
    driver: bridge
